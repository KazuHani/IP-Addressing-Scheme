<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Address Scheme Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>IP Address Scheme Calculator</h1>
    <form id="ipForm">
        <div>
            <label for="ipAddress">IP Address (e.g., 192.168.1.0):</label>
            <input type="text" id="ipAddress" name="ipAddress">
        </div>
        <div>
            <label for="subnetMask">Subnet Mask (e.g., 255.255.255.0 or /24):</label>
            <input type="text" id="subnetMask" name="subnetMask">
        </div>
        <div>
            <label for="numSubnets">Number of Desired Subnets (optional):</label>
            <input type="number" id="numSubnets" name="numSubnets" min="1">
        </div>
        <div>
            <label for="numDevices">Number of Desired Devices per Subnet (optional):</label>
            <input type="number" id="numDevices" name="numDevices" min="1">
        </div>
        <button type="button" id="calculateButton">Calculate</button>
    </form>
    <div id="results">
        <!-- Calculation results will be displayed here -->
    </div>
    <script src="script.js"></script>
</body>
</html>
